<!DOCTYPE html>
<html>
<head>
    <title>Food List</title>
</head>

<body>

    <!-- Page heading -->
    <h1>Food List</h1>

    <!-- Table to display the food items -->
    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Food</th>
                <th>Price</th>
            </tr>
        </thead>

        <!-- Rows will be added here -->
        <tbody id="foodTable">

        </tbody>
    </table>

    <p><em>This application is for demonstrating a student's web development skills only.</em></p>

    <script>
        // Gets the food list from the server
        fetch("/foods")
            .then(response => response.json())
            .then(foods => {
                const table = document.getElementById("foodTable");

                // Adds each food item to the table
                foods.forEach(food => {
                    table.innerHTML += `
                        <tr>
                            <td>${food.id}</td>
                            <td>${food.name}</td>
                            <td>$${food.price}</td>
                        </tr>
                    `;
                });
            });
    </script>

</body>
</html>
